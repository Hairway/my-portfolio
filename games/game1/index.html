<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Idle War: Merge Soldiers — interactive playable ad">
    <title>Idle War: Merge Soldiers — Playable</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #07080f;
            --surface: rgba(255,255,255,0.04);
            --border:  rgba(255,255,255,0.08);
            --accent1: #7c5cfc;
            --accent2: #f25c7a;
            --text:    #e8eaf0;
            --muted:   #7a7f96;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 16px 24px;
            gap: 14px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 0%, rgba(124,92,252,.14) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 85% 100%, rgba(242,92,122,.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .header {
            position: relative; z-index: 1;
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            flex-shrink: 0; width: 100%;
            max-width: 760px;
        }

        .btn-back {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500;
            transition: background .2s;
        }
        .btn-back:hover { background: rgba(255,255,255,.08); }

        .btn-rotate {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 18px;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            border: none; border-radius: 100px;
            color: #fff; font-size: 14px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: opacity .2s;
        }
        .btn-rotate:hover { opacity: .85; }

        /* ── GAME FRAME ── */
        .frame-shrink { position: relative; z-index: 1; flex-shrink: 0; }

        .frame-wrap {
            transform-origin: top left;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 0 2px rgba(255,255,255,.08), 0 32px 80px rgba(0,0,0,.6);
            background: #000;
            position: relative;
        }

        .frame-wrap iframe { display: block; border: none; }

        /* ── LOADER ── */
        .loader {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            background: #07080f;
            transition: opacity .4s ease;
        }
        .loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(124,92,252,.2);
            border-top-color: #7c5cfc;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        .loader-text { color: #7a7f96; font-size: 13px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── INFO ── */
        .game-info {
            position: relative; z-index: 1;
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0;
        }

        .info-tags { display: flex; gap: 6px; }
        .tag {
            font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
            padding: 4px 10px; border-radius: 100px;
            background: rgba(124,92,252,.12); color: #a08aff;
            border: 1px solid rgba(124,92,252,.2);
        }

        .info-sep { width: 1px; height: 16px; background: var(--border); }
        .info-desc { color: var(--muted); font-size: 13px; }

        /* ── TABS ── */
        .tabs {
            display: flex; gap: 4px;
            background: rgba(0,0,0,0.4);
            padding: 4px; border-radius: 100px;
            margin: 0 auto;
        }
        .tab {
            padding: 7px 16px;
            border: none; background: transparent;
            color: var(--muted); font-size: 13px; font-weight: 600; font-family: inherit;
            border-radius: 100px; cursor: pointer; transition: color .2s, background .2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            background: var(--surface); color: var(--text);
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }

        /* ── SPEC CONTAINER ── */
        .spec-container {
            display: none; width: 100%; max-width: 760px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px;
            box-shadow: 0 16px 40px rgba(0,0,0,.4);
        }
        .spec-container.active { display: block; }
        .spec-container img { width: 100%; height: auto; border-radius: 8px; display: block; margin-bottom: 16px; }
        .spec-placeholder { text-align: center; color: var(--muted); padding: 40px 20px; }

        .game-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 14px;
        }
        .game-wrapper.hidden { display: none; }

        /* ── MOBILE ── */
        @media (max-width: 600px) {
            body { padding: 10px 10px 16px; gap: 10px; }
            .btn-back, .btn-rotate { padding: 8px 14px; font-size: 13px; }
            .info-desc { display: none; }
            .tabs { margin: 0; flex-grow: 1; justify-content: center; }
            .tab { padding: 7px 12px; }
            .header { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="../../index.html#portfolio" class="btn-back" id="backBtn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back
        </a>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('game')">🎮 Playable</button>
            <button class="tab" onclick="switchTab('spec')">📄 Spec</button>
        </div>
        <button class="btn-rotate" onclick="rotate()" id="rotateBtn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1 7A6 6 0 0 1 11.2 3M13 7A6 6 0 0 1 2.8 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M11 1l.2 2.1L13.2 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Rotate
        </button>
    </div>

    <div class="game-wrapper" id="gameTab">
        <div class="frame-shrink" id="frameShrink">
            <div class="frame-wrap" id="frameWrap">
                <div class="loader" id="loader">
                    <div class="spinner"></div>
                    <span class="loader-text">Loading game…</span>
                </div>
                <iframe id="gameFrame" scrolling="no" allowfullscreen
                    onload="document.getElementById('loader').classList.add('hidden')"></iframe>
            </div>
        </div>

        <div class="game-info">
            <div class="info-tags">
                <span class="tag">Idle</span>
                <span class="tag">Merge</span>
            </div>
            <div class="info-sep"></div>
            <div class="info-desc">Merge soldiers, upgrade your army and lead them to victory!</div>
        </div>
    </div>

    <div class="spec-container" id="specTab">
        <!-- 
            To add your actual Spec:
            1. Save your Notion page as an image (or multiple images) inside games/game1/
            2. Remove the .spec-placeholder div below
            3. Add an image tag like this: <img src="spec.png" alt="Game Design Spec">
        -->
        <div class="spec-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" style="opacity: 0.5; margin-bottom: 16px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h3>No Spec Uploaded Yet</h3>
            <p style="margin-top: 8px; font-size: 14px;">Save your Notion doc as <b>spec.png</b> in this game's folder and uncomment the img tag in index.html.</p>
        </div>
    </div>

    <script>
        const PORT_W = 360, PORT_H = 640;
        // On mobile (narrow screen) start in portrait; on desktop start landscape
        let isLandscape = window.innerWidth > 700;

        function fitFrame() {
            const shrink = document.getElementById('frameShrink');
            const wrap   = document.getElementById('frameWrap');
            const iframe = document.getElementById('gameFrame');

            const nativeW = isLandscape ? PORT_H : PORT_W;
            const nativeH = isLandscape ? PORT_W : PORT_H;

            const headerEl = document.querySelector('.header');
            const infoEl   = document.querySelector('.game-info');
            const headerH  = headerEl ? headerEl.offsetHeight : 48;
            const infoH    = infoEl   ? infoEl.offsetHeight   : 32;
            const PAD = 16, GAPS = 14 * 3;

            const maxW = window.innerWidth  - PAD * 2;
            const maxH = window.innerHeight - headerH - infoH - GAPS - PAD * 2;

            const scale = Math.min(maxW / nativeW, maxH / nativeH, 1);
            const visW  = Math.round(nativeW * scale);
            const visH  = Math.round(nativeH * scale);

            iframe.width        = nativeW;
            iframe.height       = nativeH;
            iframe.style.width  = nativeW + 'px';
            iframe.style.height = nativeH + 'px';

            wrap.style.width     = nativeW + 'px';
            wrap.style.height    = nativeH + 'px';
            wrap.style.transform = `scale(${scale})`;

            shrink.style.width  = visW + 'px';
            shrink.style.height = visH + 'px';
        }

        function loadGame() {
            fitFrame();
            document.getElementById('gameFrame').src = 'original_game.html';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'game') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('gameTab').classList.remove('hidden');
                document.getElementById('specTab').classList.remove('active');
                document.getElementById('rotateBtn').style.display = 'inline-flex';
                fitFrame();
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('gameTab').classList.add('hidden');
                document.getElementById('specTab').classList.add('active');
                document.getElementById('rotateBtn').style.display = 'none';
            }
        }

        function rotate() {
            isLandscape = !isLandscape;
            fitFrame();
            document.getElementById('gameFrame').src = 'original_game.html';
        }

        window.addEventListener('resize', fitFrame);
        loadGame();
    </script>
</body>
</html>
