<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра</title>
    <!-- Тут могут быть ваши стили для игры -->
</head>
<body>

    <!-- СЮДА ВСТАВЬТЕ ВАШ КОД ИГРЫ (canvas, скрипты и т.д.) -->
    <h1>Это моя игра</h1>
    
    <!-- Скрипт защиты -->
    <script>
        function checkAuth() {
            const password = "123"; // ВАШ ПАРОЛЬ (должен быть таким же, как на главной)
            
            // Если в сессии есть пометка об успехе — просто выходим из функции
            if (sessionStorage.getItem('isAuthorized') === 'true') {
                return; 
            }

            // Если пометки нет — спрашиваем пароль
            const input = prompt("Введите пароль для доступа к игре:");

            if (input === password) {
                // Запоминаем успех
                sessionStorage.setItem('isAuthorized', 'true');
            } else {
                // Если пароль неверный — выкидываем на главную
                alert("Доступ запрещен!");
                window.location.href = "../../index.html"; // Путь к главной странице
            }
        }

        // Запускаем проверку
        checkAuth();
    </script>
</body>
</html>
