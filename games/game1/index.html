<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game #1 — Playable</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            gap: 12px;
            min-height: 100vh;
        }

        .header { display: flex; gap: 10px; flex-shrink: 0; }

        .btn {
            padding: 10px 22px;
            background: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #555; }

        /* frame-shrink занимает в layout ровно видимый размер после scale */
        .frame-shrink { flex-shrink: 0; }

        /* frame-wrap — нативный размер + CSS scale */
        .frame-wrap {
            transform-origin: top left;
            border: 4px solid #444;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        .frame-wrap iframe {
            display: block;
            border: none;
        }

        .description {
            max-width: 600px;
            text-align: center;
            line-height: 1.6;
            color: #ccc;
            font-size: 14px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="../../index.html#portfolio" class="btn">← Back</a>
        <button class="btn" onclick="rotate()">📱 Rotate</button>
    </div>

    <div class="frame-shrink" id="frameShrink">
        <div class="frame-wrap" id="frameWrap">
            <!-- src ставится через JS после задания размеров -->
            <iframe id="gameFrame" scrolling="no" allowfullscreen></iframe>
        </div>
    </div>

    <div class="description" id="desc">
        <p>Idle merge game — upgrade your army, merge soldiers and lead them to victory!</p>
    </div>

    <script>
        const PORT_W = 360, PORT_H = 640;

        // Горизонтальная — первая
        let isLandscape = true;

        function fitFrame() {
            const shrink = document.getElementById('frameShrink');
            const wrap   = document.getElementById('frameWrap');
            const iframe = document.getElementById('gameFrame');

            const nativeW = isLandscape ? PORT_H : PORT_W;
            const nativeH = isLandscape ? PORT_W : PORT_H;

            const headerH = document.querySelector('.header').offsetHeight;
            const descH   = document.getElementById('desc').offsetHeight;
            const PAD = 32, GAPS = 24;
            const maxW = window.innerWidth  - PAD;
            const maxH = window.innerHeight - headerH - descH - GAPS - PAD;

            const scale = Math.min(maxW / nativeW, maxH / nativeH, 1);
            const visW  = Math.round(nativeW * scale);
            const visH  = Math.round(nativeH * scale);

            // Задаём размеры iframe (игра увидит правильный window.innerWidth/Height)
            iframe.width        = nativeW;
            iframe.height       = nativeH;
            iframe.style.width  = nativeW + 'px';
            iframe.style.height = nativeH + 'px';

            // Нативный div масштабируем визуально
            wrap.style.width     = nativeW + 'px';
            wrap.style.height    = nativeH + 'px';
            wrap.style.transform = `scale(${scale})`;

            // Shrink-обёртка занимает ровно видимый размер
            shrink.style.width  = visW + 'px';
            shrink.style.height = visH + 'px';
        }

        function loadGame() {
            fitFrame(); // сначала размеры...
            document.getElementById('gameFrame').src = 'original_game.html'; // ...потом грузим
        }

        function rotate() {
            isLandscape = !isLandscape;
            fitFrame(); // обновляем размеры iframe...
            // ...перезагружаем игру: она инициализируется уже с новыми размерами
            // sessionStorage внутри iframe сохраняется → пароль не спрашивается повторно
            const iframe = document.getElementById('gameFrame');
            iframe.src = 'original_game.html';
        }

        window.addEventListener('resize', () => {
            fitFrame();
            // При ресайзе окна не перезагружаем — игра сама реагирует через window.resize
        });

        loadGame();
    </script>
</body>
</html>
