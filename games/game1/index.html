<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game #1 — Playable</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            gap: 12px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .btn {
            padding: 10px 22px;
            background: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #555; }

        /*
         * Ключевая идея:
         * - .frame-wrap — обёртка с transform: scale() и фиксированными
         *   пикселями НАТИВНОГО размера игры (360×640 / 640×360).
         *   scale() здесь — визуальный, layout остаётся нативным.
         * - Чтобы скомпенсировать «лишнее» layout-пространство, мы
         *   выставляем .frame-shrink нужные ширину/высоту через JS.
         */
        .frame-shrink {
            /* Занимает ровно столько места, сколько видно после scale */
            flex-shrink: 0;
            overflow: hidden; /* на случай пиксельных погрешностей */
        }

        .frame-wrap {
            transform-origin: top left;
            border: 4px solid #444;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            /* Нативный размер задаётся JS */
        }

        .frame-wrap iframe {
            display: block;
            border: none;
            /* ТОЧНЫЕ нативные пиксели — игра видит правильный viewport */
        }

        .description {
            max-width: 600px;
            text-align: center;
            line-height: 1.6;
            color: #ccc;
            font-size: 14px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="../../index.html#portfolio" class="btn">← Back</a>
        <button class="btn" onclick="rotate()">📱 Rotate</button>
    </div>

    <!-- .frame-shrink задаёт реальное место в layout -->
    <div class="frame-shrink" id="frameShrink">
        <!-- .frame-wrap — нативный размер + scale() -->
        <div class="frame-wrap" id="frameWrap">
            <iframe id="gameFrame"
                    src="original_game.html"
                    scrolling="no"
                    allowfullscreen>
            </iframe>
        </div>
    </div>

    <div class="description" id="desc">
        <p>Idle merge game — upgrade your army, merge soldiers and lead them to victory!</p>
    </div>

    <script>
        // Нативные размеры Playable
        const PORT_W = 360, PORT_H = 640;

        let isLandscape = false;

        function fitFrame() {
            const shrink  = document.getElementById('frameShrink');
            const wrap    = document.getElementById('frameWrap');
            const iframe  = document.getElementById('gameFrame');
            const header  = document.querySelector('.header');
            const desc    = document.getElementById('desc');

            // Нативный размер игры в текущей ориентации
            const nativeW = isLandscape ? PORT_H : PORT_W;
            const nativeH = isLandscape ? PORT_W : PORT_H;

            // Доступная область (вычитаем UI и отступы)
            const headerH = header.offsetHeight;
            const descH   = desc.offsetHeight;
            const PAD     = 32;   // body padding top+bottom
            const GAPS    = 24;   // два gap'а по 12px
            const maxW    = window.innerWidth  - PAD;
            const maxH    = window.innerHeight - headerH - descH - GAPS - PAD;

            // Масштаб: вписываем без искажений, максимум 1
            const scale = Math.min(maxW / nativeW, maxH / nativeH, 1);

            // Визуальный размер после scale
            const visW = nativeW * scale;
            const visH = nativeH * scale;

            // iframe → нативный размер (игра видит правильный viewport)
            iframe.width  = nativeW;
            iframe.height = nativeH;
            iframe.style.width  = nativeW + 'px';
            iframe.style.height = nativeH + 'px';

            // frame-wrap → нативный размер + scale от top-left
            wrap.style.width     = nativeW + 'px';
            wrap.style.height    = nativeH + 'px';
            wrap.style.transform = `scale(${scale})`;

            // frame-shrink → визуальный размер, чтобы layout не «проваливался»
            shrink.style.width  = visW + 'px';
            shrink.style.height = visH + 'px';
        }

        function rotate() {
            isLandscape = !isLandscape;
            fitFrame();
        }

        fitFrame();
        window.addEventListener('resize', fitFrame);
    </script>
</body>
</html>
