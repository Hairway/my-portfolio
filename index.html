<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        #content { display: none; }
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f9f9f9; }
        .game-card { border: 1px solid #ccc; padding: 20px; margin: 10px; display: inline-block; border-radius: 8px; background: white; }
    </style>
</head>
<body>

    <div id="content">
        <h1>Welcome to my Portfolio</h1>
        <p>Here are my latest HTML5 game projects:</p>
        
        <div class="game-card">
            <h3>Game #1</h3>
            <a href="games/game1/index.html">Play Game</a>
        </div>

        <div class="game-card">
            <h3>Game #2</h3>
            <a href="games/game2/index.html">Play Game</a>
        </div>
    </div>

    <script>
        function checkAuth() {
            const password = "123"; 
            if (sessionStorage.getItem('isAuthorized') === 'true') {
                document.getElementById('content').style.display = 'block';
                return;
            }

            const input = prompt("Enter password to access my portfolio:");
            if (input === password) {
                sessionStorage.setItem('isAuthorized', 'true');
                document.getElementById('content').style.display = 'block';
            } else {
                document.body.innerHTML = "<h1>Access Denied</h1>";
                setTimeout(() => { window.location.reload(); }, 2000);
            }
        }
        checkAuth();
    </script>
</body>
</html>
